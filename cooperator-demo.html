<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合作资源 — 滚动面板 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary:        #1F28E8;
    --color-primary-bright: #5A67FF;
    --color-accent-bright:  #ECFF7A;
    --color-bg:             #0A0C11;
    --color-surface:        #12151D;
    --color-surface-2:      #1A1E29;
    --color-border:         #20242E;
    --color-border-2:       #2C313E;
    --color-text:           #ECEFF4;
    --color-text-muted:     #8A93A3;
    --font-en: 'Space Grotesk', sans-serif;
    --font-cn: 'Noto Sans SC', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-en);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 60px 24px;
  }

  /* ── Section header ── */
  .section-header { text-align: center; }
  .section-label {
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--color-primary-bright);
    margin-bottom: 10px;
  }
  .section-title {
    font-size: 28px;
    font-weight: 600;
    font-family: var(--font-cn);
    line-height: 1.3;
  }
  .section-title span { color: var(--color-accent-bright); }
  .section-sub {
    margin-top: 8px;
    font-size: 13px;
    color: var(--color-text-muted);
    font-family: var(--font-cn);
  }

  /* ── Marquee ── */
  .marquee-section { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 16px; }

  .marquee-track-wrap {
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, black 7%, black 93%, transparent 100%);
  }

  .marquee-track {
    display: flex;
    gap: 14px;
    width: max-content;
    animation: scroll-fwd 32s linear infinite;
  }
  .marquee-track.rev {
    animation-name: scroll-rev;
    animation-duration: 38s;
  }
  .marquee-track-wrap:hover .marquee-track { animation-play-state: paused; }

  @keyframes scroll-fwd { from { transform: translateX(0); }    to { transform: translateX(-50%); } }
  @keyframes scroll-rev { from { transform: translateX(-50%); } to { transform: translateX(0); }    }

  /* ── Card ── */
  .coop-card {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    width: 122px;
    padding: 16px 10px 13px;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 12px;
    transition: border-color .2s, background .2s, transform .2s;
  }
  .coop-card:hover {
    border-color: var(--color-border-2);
    background: var(--color-surface-2);
    transform: translateY(-2px);
  }

  .coop-logo {
    width: 64px;
    height: 64px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .coop-logo img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .coop-name-en {
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    line-height: 1.3;
  }
  .coop-name-cn {
    font-size: 10px;
    color: var(--color-text-muted);
    font-family: var(--font-cn);
    text-align: center;
    line-height: 1.3;
  }

</style>
</head>
<body>

<div class="section-header">
  <div class="section-label">Resources & Network</div>
  <h2 class="section-title">新科系 <span>合作资源</span></h2>
  <p class="section-sub">与顶尖高校、领先企业共同构建下一代设计教育生态</p>
</div>

<div class="marquee-section">
  <div class="marquee-track-wrap"><div class="marquee-track"     id="row-a"></div></div>
  <div class="marquee-track-wrap"><div class="marquee-track rev" id="row-b"></div></div>
</div>

<script>
const ALL = [
  { nameEn:"Harvard",   nameCn:"哈佛大学",     logo:"harvard-edu-logo.jpg" },
  { nameEn:"Tongji",    nameCn:"同济大学",     logo:"tongji-logo.jpg" },
  { nameEn:"Alibaba",   nameCn:"阿里巴巴",     logo:"alibabagroup-com-logo.jpg" },
  { nameEn:"RISD",      nameCn:"罗德岛设计",   logo:"risd-edu-logo.jpg" },
  { nameEn:"HUST",      nameCn:"华中科技大学", logo:"hust-logo.jpg" },
  { nameEn:"ByteDance", nameCn:"字节跳动",     logo:"bytedance-com-logo.jpg" },
  { nameEn:"MIT",       nameCn:"麻省理工",     logo:"web-mit-edu-logo.jpg" },
  { nameEn:"PolyU HK",  nameCn:"香港理工大学", logo:"polyu-logo.jpg" },
  { nameEn:"Xiaomi",    nameCn:"小米",         logo:"xiaomi-com-ge-logo.jpg" },
  { nameEn:"UCL",       nameCn:"伦敦大学学院", logo:"ucl-ac-uk-logo.jpg" },
  { nameEn:"CMU",       nameCn:"卡内基梅隆",   logo:"cmu-edu-logo.jpg" },
  { nameEn:"NIO",       nameCn:"蔚来汽车",     logo:"nio-com-logo.jpg" },
  { nameEn:"RCA",       nameCn:"英国皇家艺术", logo:"rca-logo.jpg" },
  { nameEn:"Columbia",  nameCn:"哥伦比亚大学", logo:"columbiadoctors-org-logo.jpg" },
];

const LOGO_BASE = "img/coop_logo/";

const rowA = ALL.filter((_, i) => i % 2 === 0);
const rowB = ALL.filter((_, i) => i % 2 === 1);

function card(c) {
  return `<div class="coop-card">
    <div class="coop-logo"><img src="${LOGO_BASE}${c.logo}" alt="${c.nameEn}"></div>
    <div class="coop-name-en">${c.nameEn}</div>
    <div class="coop-name-cn">${c.nameCn}</div>
  </div>`;
}

function fill(id, items) {
  document.getElementById(id).innerHTML = [...items, ...items].map(card).join('');
}

fill('row-a', rowA);
fill('row-b', rowB);
</script>
</body>
</html>
